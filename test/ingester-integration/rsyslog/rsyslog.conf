# rsyslog config for integration testing.
# Forwards all messages to gastrolog on the host via two paths:
#   1. Syslog TCP  → gastrolog syslog ingester
#   2. RELP        → gastrolog relp ingester

module(load="immark" interval="30")     # periodic "-- MARK --" messages
module(load="omrelp")                    # RELP forwarding

# Forward via syslog TCP.
*.* action(
    type="omfwd"
    target="host.docker.internal"
    port="1514"
    protocol="tcp"
    template="RSYSLOG_SyslogProtocol23Format"
)

# Forward via RELP.
*.* action(
    type="omrelp"
    target="host.docker.internal"
    port="2514"
    template="RSYSLOG_SyslogProtocol23Format"
)
