# Fluent Bit config for integration testing.
# Generates dummy log lines and forwards via two outputs to gastrolog
# on the host:
#   1. Fluent Forward protocol → gastrolog fluentfwd ingester
#   2. Loki HTTP push          → gastrolog http ingester
#
# Kafka is fed separately (see compose.yml kafka-producer service) to
# avoid a feedback loop: tailing container logs that include Kafka's
# own output would create an infinite cycle.

[SERVICE]
    Flush        1
    Log_Level    info

[INPUT]
    Name         dummy
    Tag          test.fluent
    Dummy        {"message": "fluent-bit integration test log line"}
    Rate         1

[OUTPUT]
    Name         forward
    Match        *
    Host         host.docker.internal
    Port         24224

[OUTPUT]
    Name         loki
    Match        *
    Host         host.docker.internal
    Port         3100
    Labels       job=fluent-bit
