# 3-node Raft cluster for E2E testing.
#
# Default: fully containerized — Playwright runs inside Docker.
# Dev mode: `docker compose --profile dev up` exposes ports on the host
# so you can run Playwright locally with --headed.
#
# Usage:
#   just e2e           # build, start cluster, run tests, tear down
#   just e2e-up        # start cluster with host ports (dev mode)
#   just e2e-down      # tear down

services:
  # ── Leader node ──
  # Bootstraps the cluster, writes join token to shared volume.
  node-1:
    image: gastrolog-e2e
    build:
      context: ../..
    container_name: gastrolog-e2e-node-1
    environment:
      GASTROLOG_NAME: node-1
      GASTROLOG_LISTEN: ":4564"
      GASTROLOG_CLUSTER_ADDR: "node-1:4566"
      GASTROLOG_BOOTSTRAP: "1"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        # Start gastrolog and capture the join token from logs.
        /docker-entrypoint.sh server 2>&1 | while IFS= read -r line; do
          echo "$$line"
          case "$$line" in
            *"cluster join token"*token=*)
              token=$${line##*token=}
              token=$${token%% *}
              if [ -n "$$token" ]; then
                echo "$$token" > /shared/join-token
                echo ">>> join token saved to /shared/join-token"
              fi
              ;;
          esac
        done
    volumes:
      - shared:/shared
      - node1-config:/config
      - node1-vaults:/vaults
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:4564/healthz"]
      interval: 3s
      timeout: 5s
      retries: 30
      start_period: 10s
    networks:
      - cluster

  # ── Follower node 2 ──
  node-2:
    image: gastrolog-e2e
    container_name: gastrolog-e2e-node-2
    environment:
      GASTROLOG_NAME: node-2
      GASTROLOG_LISTEN: ":4564"
      GASTROLOG_CLUSTER_ADDR: "node-2:4566"
      GASTROLOG_JOIN_ADDR: "node-1:4566"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        # Wait for join token from node-1.
        echo "Waiting for join token..."
        while [ ! -f /shared/join-token ]; do sleep 1; done
        export GASTROLOG_JOIN_TOKEN=$$(cat /shared/join-token)
        echo "Got join token, starting node-2"
        exec /docker-entrypoint.sh server
    volumes:
      - shared:/shared
      - node2-config:/config
      - node2-vaults:/vaults
    depends_on:
      node-1:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:4564/healthz"]
      interval: 3s
      timeout: 5s
      retries: 30
      start_period: 10s
    networks:
      - cluster

  # ── Follower node 3 ──
  node-3:
    image: gastrolog-e2e
    container_name: gastrolog-e2e-node-3
    environment:
      GASTROLOG_NAME: node-3
      GASTROLOG_LISTEN: ":4564"
      GASTROLOG_CLUSTER_ADDR: "node-3:4566"
      GASTROLOG_JOIN_ADDR: "node-1:4566"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        # Wait for join token from node-1.
        echo "Waiting for join token..."
        while [ ! -f /shared/join-token ]; do sleep 1; done
        export GASTROLOG_JOIN_TOKEN=$$(cat /shared/join-token)
        echo "Got join token, starting node-3"
        exec /docker-entrypoint.sh server
    volumes:
      - shared:/shared
      - node3-config:/config
      - node3-vaults:/vaults
    depends_on:
      node-1:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:4564/healthz"]
      interval: 3s
      timeout: 5s
      retries: 30
      start_period: 10s
    networks:
      - cluster

  # ── Playwright test runner (containerized mode) ──
  playwright:
    image: mcr.microsoft.com/playwright:v1.52.0-noble
    container_name: gastrolog-e2e-playwright
    profiles: ["test"]
    working_dir: /e2e
    environment:
      E2E_BASE_URL: "http://node-1:4564"
      E2E_NODE2_URL: "http://node-2:4564"
      E2E_NODE3_URL: "http://node-3:4564"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        cd /e2e
        npm install --no-audit --no-fund
        npx playwright test
    volumes:
      - .:/e2e
      - ./results:/e2e/results
    depends_on:
      node-1:
        condition: service_healthy
      node-2:
        condition: service_healthy
      node-3:
        condition: service_healthy
    networks:
      - cluster

  # ── Dev mode: expose host ports for local Playwright ──
  dev-proxy:
    image: busybox:1.37-musl
    container_name: gastrolog-e2e-dev-proxy
    profiles: ["dev"]
    entrypoint: ["sleep", "infinity"]
    ports:
      - "14564:14564" # node-1
      - "14574:14574" # node-2
      - "14584:14584" # node-3
    networks:
      - cluster
    depends_on:
      node-1:
        condition: service_healthy
      node-2:
        condition: service_healthy
      node-3:
        condition: service_healthy

  # Socat forwarders expose each node via the dev-proxy ports.
  # These only start under the "dev" profile.
  fwd-node-1:
    image: alpine/socat:latest
    profiles: ["dev"]
    command: "TCP-LISTEN:14564,fork,reuseaddr TCP:node-1:4564"
    network_mode: "service:dev-proxy"
    depends_on: [dev-proxy]

  fwd-node-2:
    image: alpine/socat:latest
    profiles: ["dev"]
    command: "TCP-LISTEN:14574,fork,reuseaddr TCP:node-2:4564"
    network_mode: "service:dev-proxy"
    depends_on: [dev-proxy]

  fwd-node-3:
    image: alpine/socat:latest
    profiles: ["dev"]
    command: "TCP-LISTEN:14584,fork,reuseaddr TCP:node-3:4564"
    network_mode: "service:dev-proxy"
    depends_on: [dev-proxy]

volumes:
  shared:
  node1-config:
  node1-vaults:
  node2-config:
  node2-vaults:
  node3-config:
  node3-vaults:

networks:
  cluster:
