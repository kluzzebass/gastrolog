name: Race

on:
  workflow_dispatch:
    inputs:
      count:
        description: "Iterations per test (higher = better flake coverage)"
        default: "3"
        required: false
      packages:
        description: "Go packages to test (default: ./...)"
        default: "./..."
        required: false

jobs:
  race:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache-dependency-path: backend/go.sum

      - name: Build
        run: go build -v ./...

      - name: Race tests
        run: go test -race -v -timeout 30m -count=${{ inputs.count }} ${{ inputs.packages }}
