name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache: false

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Build frontend
        working-directory: frontend
        run: |
          bun install --frozen-lockfile
          bun run build

      - name: Embed frontend assets
        working-directory: backend
        run: |
          rm -rf internal/frontend/dist/*
          cp -r ../frontend/dist/* internal/frontend/dist/
          go run ./cmd/compress-assets internal/frontend/dist

      - name: Upload embedded assets
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: backend/internal/frontend/dist/
          retention-days: 1

  test:
    needs: prepare
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache-dependency-path: backend/go.sum

      - name: Download embedded assets
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: backend/internal/frontend/dist/

      - name: Run tests
        working-directory: backend
        run: go test -v ./...

  draft:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache-dependency-path: backend/go.sum

      - name: Download embedded assets
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: backend/internal/frontend/dist/

      - name: Build binaries
        working-directory: backend
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          LDFLAGS="-s -w -X main.version=$VERSION"

          mkdir -p dist

          # Linux
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -ldflags "$LDFLAGS" -o dist/gastrolog-linux-amd64 ./cmd/gastrolog
          CGO_ENABLED=0 GOOS=linux GOARCH=arm64 go build -ldflags "$LDFLAGS" -o dist/gastrolog-linux-arm64 ./cmd/gastrolog

          # macOS
          CGO_ENABLED=0 GOOS=darwin GOARCH=amd64 go build -ldflags "$LDFLAGS" -o dist/gastrolog-darwin-amd64 ./cmd/gastrolog
          CGO_ENABLED=0 GOOS=darwin GOARCH=arm64 go build -ldflags "$LDFLAGS" -o dist/gastrolog-darwin-arm64 ./cmd/gastrolog

          cd dist && sha256sum * > checksums.txt

      - name: Create Draft Release
        uses: softprops/action-gh-release@v1
        with:
          draft: true
          files: |
            backend/dist/gastrolog-linux-amd64
            backend/dist/gastrolog-linux-arm64
            backend/dist/gastrolog-darwin-amd64
            backend/dist/gastrolog-darwin-arm64
            backend/dist/checksums.txt
          generate_release_notes: true
