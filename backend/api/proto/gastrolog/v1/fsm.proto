syntax = "proto3";

package gastrolog.v1;

import "google/protobuf/timestamp.proto";
import "gastrolog/v1/system.proto";
import "gastrolog/v1/storage.proto";

option go_package = "gastrolog/api/gen/gastrolog/v1;gastrologv1";

// SystemCommand is a single mutation applied to the system store via Raft.
// Each variant maps 1:1 to a system.Store write method.
message SystemCommand {
  oneof command {
    PutFilterCommand put_filter = 1;
    DeleteFilterCommand delete_filter = 2;
    PutRotationPolicyCommand put_rotation_policy = 3;
    DeleteRotationPolicyCommand delete_rotation_policy = 4;
    PutRetentionPolicyCommand put_retention_policy = 5;
    DeleteRetentionPolicyCommand delete_retention_policy = 6;
    PutVaultCommand put_vault = 7;
    DeleteVaultCommand delete_vault = 8;
    PutIngesterCommand put_ingester = 9;
    DeleteIngesterCommand delete_ingester = 10;
    PutSettingCommand put_setting = 11;
    DeleteSettingCommand delete_setting = 12;
    PutCertificateCommand put_certificate = 13;
    DeleteCertificateCommand delete_certificate = 14;
    CreateUserCommand create_user = 15;
    UpdatePasswordCommand update_password = 16;
    UpdateUserRoleCommand update_user_role = 17;
    UpdateUsernameCommand update_username = 18;
    DeleteUserCommand delete_user = 19;
    InvalidateTokensCommand invalidate_tokens = 20;
    PutUserPreferencesCommand put_user_preferences = 21;
    CreateRefreshTokenCommand create_refresh_token = 22;
    DeleteRefreshTokenCommand delete_refresh_token = 23;
    DeleteUserRefreshTokensCommand delete_user_refresh_tokens = 24;
    PutNodeConfigCommand put_node_config = 25;
    DeleteNodeConfigCommand delete_node_config = 26;
    PutClusterTLSCommand put_cluster_tls = 27;
    PutRouteCommand put_route = 28;
    DeleteRouteCommand delete_route = 29;
    PutManagedFileCommand put_managed_file = 30;
    DeleteManagedFileCommand delete_managed_file = 31;
    PutCloudServiceCommand put_cloud_service = 32;
    DeleteCloudServiceCommand delete_cloud_service = 33;
    SetNodeStorageConfigCommand set_node_storage_config = 34;
    PutTierCommand put_tier = 35;
    DeleteTierCommand delete_tier = 36;
    SetTierPlacementsCommand set_tier_placements = 37;
    SetSetupWizardDismissedCommand set_setup_wizard_dismissed = 38;
    SetIngesterAliveCommand set_ingester_alive = 39;
    SetIngesterAssignmentCommand set_ingester_assignment = 40;
    SetIngesterCheckpointCommand set_ingester_checkpoint = 41;
  }
}

// --- Filters ---

message PutFilterCommand {
  bytes id = 1;
  string name = 2;
  string expression = 3;
}

message DeleteFilterCommand {
  bytes id = 1;
}

// --- Rotation Policies ---

message PutRotationPolicyCommand {
  bytes id = 1;
  string name = 2;
  optional string max_bytes = 3;
  optional string max_age = 4;
  optional int64 max_records = 5;
  optional string cron = 6;
}

message DeleteRotationPolicyCommand {
  bytes id = 1;
}

// --- Retention Policies ---

message PutRetentionPolicyCommand {
  bytes id = 1;
  string name = 2;
  optional string max_age = 3;
  optional string max_bytes = 4;
  optional int64 max_chunks = 5;
}

message DeleteRetentionPolicyCommand {
  bytes id = 1;
}

// --- Vaults ---

// PutVaultCommand carries the full vault config from system.proto. Embedded
// (rather than flattened) so the conversion layer is shared between the
// API and the FSM — matches PutCloudServiceCommand and
// SetNodeStorageConfigCommand pattern. Wire format break vs the previous
// flat {id, name, enabled} shape; acceptable per redesign decision 11.
message PutVaultCommand {
  VaultConfig vault = 1;
}

message DeleteVaultCommand {
  bytes id = 1;
  // When true, the vault's data directory is deleted from disk on the owning node.
  bool delete_data = 2;
}

// --- Ingesters ---

message PutIngesterCommand {
  bytes id = 1;
  string name = 2;
  string type = 3;
  bool enabled = 4;
  map<string, string> params = 5;
  bytes node_id = 6 [deprecated = true]; // Legacy. Use node_ids.
  repeated bytes node_ids = 7;           // Allowed nodes.
  bool singleton = 8;                    // HA semantics: false = parallel (run on every node), true = Raft-assigned singleton with failover.
}

message DeleteIngesterCommand {
  bytes id = 1;
}

// --- Settings ---

message PutSettingCommand {
  string key = 1;
  string value = 2;
  // When non-empty, NotifySettingPut uses this value instead of key (which
  // stays "server" for the JSON blob). Empty preserves legacy "server" behavior.
  optional string notify_key = 3;
}

message DeleteSettingCommand {
  string key = 1;
}

// --- Certificates ---

message PutCertificateCommand {
  bytes id = 1;
  string name = 2;
  string cert_pem = 3;
  string key_pem = 4;
  string cert_file = 5;
  string key_file = 6;
}

message DeleteCertificateCommand {
  bytes id = 1;
}

// --- Users ---

message CreateUserCommand {
  bytes id = 1;
  string username = 2;
  string password_hash = 3;
  string role = 4;
  string preferences = 5;
  google.protobuf.Timestamp token_invalidated_at = 6;
  google.protobuf.Timestamp created_at = 7;
  google.protobuf.Timestamp updated_at = 8;
}

message UpdatePasswordCommand {
  bytes id = 1;
  string password_hash = 2;
}

message UpdateUserRoleCommand {
  bytes id = 1;
  string role = 2;
}

message UpdateUsernameCommand {
  bytes id = 1;
  string username = 2;
}

message DeleteUserCommand {
  bytes id = 1;
}

message InvalidateTokensCommand {
  bytes id = 1;
  google.protobuf.Timestamp at = 2;
}

message PutUserPreferencesCommand {
  bytes id = 1;
  string preferences = 2;
}

// --- Refresh Tokens ---

message CreateRefreshTokenCommand {
  bytes id = 1;
  bytes user_id = 2;
  string token_hash = 3;
  google.protobuf.Timestamp expires_at = 4;
  google.protobuf.Timestamp created_at = 5;
}

message DeleteRefreshTokenCommand {
  bytes id = 1;
}

message DeleteUserRefreshTokensCommand {
  bytes user_id = 1;
}

// --- Nodes ---

message PutNodeConfigCommand {
  bytes id = 1;
  string name = 2;
}

message DeleteNodeConfigCommand {
  bytes id = 1;
}

// --- Cluster TLS ---

message PutClusterTLSCommand {
  bytes ca_cert_pem = 1;
  bytes ca_key_pem = 2;
  bytes cluster_cert_pem = 3;
  bytes cluster_key_pem = 4;
  string join_token = 5;
}

// --- Routes ---

message PutRouteCommand {
  bytes id = 1;
  string name = 2;
  bytes filter_id = 3;
  repeated bytes destination_ids = 4;
  string distribution = 5;
  bool enabled = 6;
  bool eject_only = 7;
}

message DeleteRouteCommand {
  bytes id = 1;
}

// --- Managed Files ---

message PutManagedFileCommand {
  bytes id = 1;
  string name = 2;          // original filename
  string sha256 = 3;        // hex-encoded content hash
  int64 size = 4;           // file size in bytes
  string uploaded_at = 5;   // RFC3339 timestamp
}

message DeleteManagedFileCommand {
  bytes id = 1;
}

// --- Cloud Services ---

// PutCloudServiceCommand carries the full API CloudService from storage.proto.
// Previously flattened all fields here; now embeds to share the conversion layer.
// See gastrolog-2f8et. Breaking change: not wire-compatible with old Raft logs.
message PutCloudServiceCommand {
  CloudService cloud_service = 1;
}

message DeleteCloudServiceCommand {
  bytes id = 1;
}

// --- Node Storage ---

// SetNodeStorageConfigCommand carries the full API NodeStorageConfig from storage.proto.
message SetNodeStorageConfigCommand {
  NodeStorageConfig node_storage = 1;
}

// --- Tiers ---

// PutTierCommand carries the full API TierConfig from system.proto.
message PutTierCommand {
  TierConfig tier = 1;
}

message DeleteTierCommand {
  bytes id = 1;
  bool drain = 2; // When true, drain chunks to the next tier before deleting.
}

// --- Tier Placements ---

message SetTierPlacementsCommand {
  bytes tier_id = 1;
  repeated TierPlacement placements = 2;
}

// --- Setup Wizard ---

message SetSetupWizardDismissedCommand {
  bool dismissed = 1;
}

// --- Ingester Runtime ---

message SetIngesterAliveCommand {
  bytes ingester_id = 1;
  string node_id = 2;
  bool alive = 3;
}

message SetIngesterAssignmentCommand {
  bytes ingester_id = 1;
  string node_id = 2; // Assigned node. Empty = unassigned.
}

message SetIngesterCheckpointCommand {
  bytes ingester_id = 1;
  bytes data = 2; // Opaque checkpoint blob.
}

// --- Snapshot ---

// SystemSnapshot captures the full system state for FSM.Snapshot()/Restore().
// Each repeated field contains one entry per entity, using the Put/Create
// command messages to represent complete entity state.
message SystemSnapshot {
  repeated PutFilterCommand filters = 1;
  repeated PutRotationPolicyCommand rotation_policies = 2;
  repeated PutRetentionPolicyCommand retention_policies = 3;
  repeated PutVaultCommand vaults = 4;
  repeated PutIngesterCommand ingesters = 5;
  map<string, string> settings = 6;
  repeated PutCertificateCommand certificates = 7;
  repeated CreateUserCommand users = 8;
  repeated CreateRefreshTokenCommand refresh_tokens = 9;
  repeated PutNodeConfigCommand node_configs = 10;
  PutClusterTLSCommand cluster_tls = 11;
  repeated PutRouteCommand routes = 12;
  repeated PutManagedFileCommand managed_files = 13;
  repeated PutCloudServiceCommand cloud_services = 14;
  repeated SetNodeStorageConfigCommand node_storage_configs = 15;
  repeated PutTierCommand tiers = 16;
  repeated SetTierPlacementsCommand tier_placements = 17;
  bool setup_wizard_dismissed = 18;
  repeated SetIngesterAliveCommand ingester_alive = 19;
  repeated SetIngesterAssignmentCommand ingester_assignments = 20;
  repeated SetIngesterCheckpointCommand ingester_checkpoints = 21;
}
