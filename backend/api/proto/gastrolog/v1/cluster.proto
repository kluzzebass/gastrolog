syntax = "proto3";
package gastrolog.v1;

import "google/protobuf/timestamp.proto";
import "gastrolog/v1/job.proto";
import "gastrolog/v1/query.proto";
import "gastrolog/v1/system.proto";
import "gastrolog/v1/vault.proto";

option go_package = "gastrolog/api/gen/gastrolog/v1;gastrologv1";

// ForwardApplyRequest carries a pre-marshaled ConfigCommand for the leader
// to apply via raft.Apply(). Used by followers to proxy config writes.
message ForwardApplyRequest {
  bytes command = 1;
}

message ForwardApplyResponse {}

// EnrollRequest is sent by a joining node to the cluster leader.
// The token_secret proves the node is authorized to join.
message EnrollRequest {
  string token_secret = 1;
  bytes node_id = 2;
  string node_addr = 3;
}

// EnrollResponse returns the cluster TLS material to the joining node.
message EnrollResponse {
  bytes ca_cert_pem = 1;
  bytes cluster_cert_pem = 2;
  bytes cluster_key_pem = 3;
}

// BroadcastRequest sends a typed message to a peer node.
message BroadcastRequest {
  BroadcastMessage message = 1;
}

message BroadcastResponse {}

// BroadcastMessage is the envelope for all peer-to-peer broadcast messages.
// The oneof payload makes it extensible — new message types are added as
// new variants without breaking existing receivers.
message BroadcastMessage {
  bytes sender_id = 1;
  google.protobuf.Timestamp timestamp = 2;

  oneof payload {
    NodeStats node_stats = 10;
    NodeJobs node_jobs = 11;
  }
}

// NodeJobs reports active job state for a single cluster node.
// Broadcast periodically and immediately on job completion/failure.
message NodeJobs {
  repeated Job jobs = 1;
}

// NodeStats reports runtime statistics for a single cluster node.
message NodeStats {
  double cpu_percent = 1;
  uint64 memory_inuse = 2;
  uint64 memory_rss = 3;
  uint64 memory_heap_alloc = 4;
  uint64 memory_sys = 5;
  uint32 goroutines = 6;
  uint32 ingest_queue_depth = 7;
  uint32 ingest_queue_capacity = 8;
  repeated VaultStats vaults = 9;
  repeated IngesterNodeStats ingesters = 10;

  // Identity
  string node_name = 11;
  string version = 12;
  string raft_state = 13;
  string suffrage = 14;
  int64 uptime_seconds = 15;

  // Memory detail
  uint64 memory_heap_idle = 16;
  uint64 memory_heap_released = 17;
  uint64 memory_stack_inuse = 18;
  uint64 memory_heap_objects = 19;
  uint32 num_gc = 20;

  // Raft
  uint64 raft_term = 21;
  uint64 raft_commit_index = 22;
  uint64 raft_applied_index = 23;
  string raft_last_contact = 24;
  uint64 raft_fsm_pending = 25;

  // Addresses (advertised via broadcast so peers know each other's endpoints)
  string api_address = 26;        // HTTP API address (e.g. ":4564")
  string pprof_address = 27;      // pprof HTTP address, empty if disabled

  // Route stats (aggregated cluster-wide by GetRouteStats RPC)
  int64 route_stats_ingested = 28;
  int64 route_stats_dropped = 29;
  int64 route_stats_routed = 30;
  bool route_stats_filter_active = 31;
  repeated gastrolog.v1.VaultRouteStats route_vault_stats = 32;
  repeated gastrolog.v1.PerRouteStats route_per_route_stats = 33;

  // Forwarding stats — records sent and received via ForwardRecords RPCs.
  int64 forwarded_sent = 34;
  int64 forwarded_received = 35;

  // Active system alerts on this node.
  repeated SystemAlert alerts = 36;

  // Per-peer inter-node gRPC transport bytes, from this node's perspective.
  // Populated from the cluster transport stats handlers — includes Raft,
  // broadcast, tier replication, query forwarding, chunk streaming, etc.
  // See gastrolog-47u85.
  repeated PeerBytesStat peer_bytes = 37;
}

// PeerBytesStat reports cumulative gRPC wire bytes sent to and received from
// a single peer, since the emitting node started. Rate is left to the
// consumer (UI / PromQL-equivalent delta) — these are monotonic counters.
message PeerBytesStat {
  string peer = 1;        // target node ID
  int64 bytes_sent = 2;   // bytes this node has sent to peer
  int64 bytes_received = 3; // bytes this node has received from peer
}

// SystemAlert represents a runtime condition that operators should be aware of.
// Alerts are keyed by ID for deduplication — the same condition doesn't create
// multiple alerts. They auto-clear when the component that raised them detects
// the condition has resolved.
message SystemAlert {
  bytes id = 1;                           // stable key for dedup (e.g. "vault-init:$vaultID")
  AlertSeverity severity = 2;
  string source = 3;                       // component name (e.g. "orchestrator", "forwarder")
  string message = 4;
  google.protobuf.Timestamp first_seen = 5;
  google.protobuf.Timestamp last_seen = 6;
}

enum AlertSeverity {
  ALERT_SEVERITY_UNSPECIFIED = 0;
  ALERT_SEVERITY_WARNING = 1;
  ALERT_SEVERITY_ERROR = 2;
}

// IngesterNodeStats reports per-ingester statistics on a cluster node.
message IngesterNodeStats {
  bytes id = 1;
  uint64 messages_ingested = 2;
  uint64 bytes_ingested = 3;
  uint64 errors = 4;
  bool running = 5;
  string name = 6;
}

// ForwardRecordsRequest ships a batch of records to the node that owns
// the destination vault. Sent by retention eject to route records to a
// remote vault. Records are appended to the destination vault's active
// chunk.
message ForwardRecordsRequest {
  bytes vault_id = 1;
  repeated ExportRecord records = 2;
  reserved 3, 4; // was tier_id, chunk_id (gastrolog-572d7)
}

message ForwardRecordsResponse {
  int64 records_written = 1;
}

// ForwardTierApplyRequest carries a pre-marshaled tier FSM command for the
// tier Raft leader to apply. Used when the config placement leader (which
// runs retention and chunk lifecycle) is not the tier Raft leader.
message ForwardTierApplyRequest {
  bytes group_id = 1; // tier Raft group ID (= tier UUID)
  bytes command = 2;   // pre-marshaled tier FSM command
}

message ForwardTierApplyResponse {}

// --- Tier Replication Protocol ---
//
// A single ordered bidirectional stream per tier per follower. Replaces
// the separate ForwardRecords (fire-and-forget) and ReplicateSealedChunk
// (one-shot) streams with a unified protocol where all operations for a
// tier are sequenced on one stream. This eliminates the race between
// record forwarding and sealed chunk replacement.

// TierReplicationCommand is sent leader → follower. The vault_id and
// tier_id identify the target tier; the oneof command determines the
// operation. New command types can be added without changing framing.
message TierReplicationCommand {
  bytes vault_id = 1;
  bytes tier_id = 2;

  oneof command {
    TierReplicationAppend append = 10;
    TierReplicationSeal seal = 11;
    TierReplicationImport import_sealed = 12;
    TierReplicationDelete delete_chunk = 13;
  }
}

// TierReplicationAppend forwards records to the follower's active chunk.
message TierReplicationAppend {
  bytes chunk_id = 1;               // leader's active chunk ID
  repeated ExportRecord records = 2;
}

// TierReplicationSeal tells the follower to seal its active chunk.
message TierReplicationSeal {
  bytes chunk_id = 1; // expected active chunk ID
}

// TierReplicationImport sends the canonical sealed chunk. The follower
// replaces any forwarded version with this authoritative copy.
message TierReplicationImport {
  bytes chunk_id = 1;
  repeated ExportRecord records = 2;
}

// TierReplicationDelete tells the follower to delete a sealed chunk
// (e.g. after retention expiry or tier transition on the leader).
message TierReplicationDelete {
  bytes chunk_id = 1;
}

// TierReplicationAck is sent follower → leader after each command.
message TierReplicationAck {
  bool ok = 1;
  string error = 2;
  bytes chunk_id = 3; // echoes the chunk_id from the command
}

// ForwardSearchRequest is sent to the node that owns a remote vault,
// asking it to execute a search locally and return matching records.
message ForwardSearchRequest {
  bytes vault_id = 1;
  string query = 2;
  bytes resume_token = 3; // resume token for pagination across pages
}

message ForwardSearchResponse {
  repeated ExportRecord records = 1;
  bytes resume_token = 2;
  bool has_more = 3;
  TableResult table_result = 4;          // Pipeline results (timechart, stats)
  repeated HistogramBucket histogram = 5; // Volume histogram from this node's vaults
}

// ForwardGetContextRequest asks a remote node to return records surrounding
// a specific record in one of its local vaults.
message ForwardGetContextRequest {
  bytes vault_id = 1;
  bytes chunk_id = 2;
  uint64 pos = 3;
  int32 before = 4;
  int32 after = 5;
}

message ForwardGetContextResponse {
  repeated ExportRecord before = 1;
  ExportRecord anchor = 2;
  repeated ExportRecord after = 3;
}

// ForwardListChunksRequest asks a remote node to list chunks in one of its
// local vaults. Used by the coordinating node to show chunk details for
// remote vaults in the inspector.
message ForwardListChunksRequest {
  bytes vault_id = 1;
}

message ForwardListChunksResponse {
  repeated ChunkMeta chunks = 1;
}

// ForwardGetIndexesRequest asks a remote node to return index status for
// a specific chunk in one of its local vaults.
message ForwardGetIndexesRequest {
  bytes vault_id = 1;
  bytes chunk_id = 2;
}

message ForwardGetIndexesResponse {
  bool sealed = 1;
  repeated IndexInfo indexes = 2;
}

// ForwardValidateVaultRequest asks a remote node to validate a vault's
// chunk and index integrity.
message ForwardValidateVaultRequest {
  bytes vault_id = 1;
}

message ForwardValidateVaultResponse {
  bool valid = 1;
  repeated ChunkValidation chunks = 2;
}

// ForwardGetChunkRequest asks a remote node to return details for a specific
// chunk in one of its local vaults.
message ForwardGetChunkRequest {
  bytes vault_id = 1;
  bytes chunk_id = 2;
}

message ForwardGetChunkResponse {
  ChunkMeta chunk = 1;
}

// ForwardAnalyzeChunkRequest asks a remote node to run index analysis on a
// vault (or specific chunk) and return the results.
message ForwardAnalyzeChunkRequest {
  bytes vault_id = 1;
  bytes chunk_id = 2; // empty = analyze all chunks
}

message ForwardAnalyzeChunkResponse {
  repeated ChunkAnalysis analyses = 1;
}

// ForwardSealVaultRequest asks a remote node to seal the active chunk of a vault.
message ForwardSealVaultRequest {
  bytes vault_id = 1;
}

message ForwardSealVaultResponse {}

// ForwardReindexVaultRequest asks a remote node to rebuild all indexes for a vault.
message ForwardReindexVaultRequest {
  bytes vault_id = 1;
}

message ForwardReindexVaultResponse {
  bytes job_id = 1;
}

// ForwardExportToVaultRequest asks a remote node to run an export-to-vault job.
// The remote node owns the target vault and runs the export locally.
message ForwardExportToVaultRequest {
  string expression = 1;   // Query expression (export op stripped)
  bytes target_vault_id = 2;  // Target vault UUID (already resolved)
}

message ForwardExportToVaultResponse {
  bytes job_id = 1;
}

// NotifyEvictionRequest is sent by the leader to a node that has been removed
// from the cluster. The evicted node should initiate a graceful shutdown.
message NotifyEvictionRequest {
  string reason = 1;
}

message NotifyEvictionResponse {}

// ForwardRemoveNodeRequest is sent by a follower to the leader to remove
// a node from the cluster. The leader executes the Raft membership change
// and sends the eviction notification.
message ForwardRemoveNodeRequest {
  bytes node_id = 1;
}

message ForwardRemoveNodeResponse {}

// ForwardSetNodeSuffrageRequest is sent by a follower to the leader to
// promote or demote a node's voting status.
message ForwardSetNodeSuffrageRequest {
  bytes node_id = 1;
  string node_addr = 2;
  bool voter = 3;
}

message ForwardSetNodeSuffrageResponse {}

// ForwardExplainRequest asks a remote node to return the explain plan for
// one or more of its local vaults.
message ForwardExplainRequest {
  string query = 1;
  repeated bytes vault_ids = 2;  // batch all vaults for this node in one RPC
}

message ForwardExplainResponse {
  repeated ChunkPlan chunks = 1;  // reuses existing ChunkPlan from query.proto
  int32 total_chunks = 2;
}

// ForwardFollowRequest opens a server-streaming follow (tail -f) on a remote
// node's local vaults. The remote node runs eng.Follow() and streams new
// records as they arrive. The coordinator merges local and remote streams.
message ForwardFollowRequest {
  repeated bytes vault_ids = 1;
  string query = 2;
}

// ForwardFollowResponse carries a batch of new records from a remote follow.
message ForwardFollowResponse {
  repeated ExportRecord records = 1;
}

// ImportRecordMessage carries a single record for client-streaming import.
// vault_id is set on every message; the server validates consistency.
message ImportRecordMessage {
  bytes vault_id = 1;
  ExportRecord record = 2;
  bytes tier_id = 3;   // optional: route to a specific tier's active chunk (StreamToTier)
  reserved 4;           // was chunk_id (gastrolog-63rnl)
}

// --- Managed file distribution ---

// PullManagedFileRequest asks a peer to stream a managed file's contents.
message PullManagedFileRequest {
  bytes file_id = 1;
}

// PullManagedFileChunk carries a chunk of file data during streaming transfer.
// The first chunk includes the filename and expected SHA256 hash.
message PullManagedFileChunk {
  bytes data = 1;            // chunk of file content (up to 64KB)
  string name = 2;           // original filename (first chunk only)
  string sha256 = 3;         // expected hash (first chunk only)
}

// ListPeerManagedFilesRequest asks a peer which managed files it has on disk.
message ListPeerManagedFilesRequest {}

// ListPeerManagedFilesResponse returns the file IDs present on a peer.
message ListPeerManagedFilesResponse {
  repeated bytes file_ids = 1;
}

// ForwardRPCFrame carries a single frame in a generic ForwardRPC
// bidirectional stream. Replaces per-RPC Forward* messages.
//
// Client sends: first frame has procedure + payload (serialized request).
// Server sends: one or more frames with payload (serialized response).
//   - Unary: single response frame with end_stream=true.
//   - Server-streaming: multiple payload frames, last has end_stream=true.
//   - Error: error_code != 0 with error_message, end_stream=true.
message ForwardRPCFrame {
  string procedure = 1;     // Connect procedure path, set in first client frame
  bytes payload = 2;        // proto-encoded request or response message
  uint32 error_code = 3;    // Connect error code (0 = success, response only)
  string error_message = 4; // error detail (response only)
  bool end_stream = 5;      // true on last response frame
}
