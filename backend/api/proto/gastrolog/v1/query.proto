syntax = "proto3";

package gastrolog.v1;

option go_package = "gastrolog/api/gen/gastrolog/v1;gastrologv1";

import "google/protobuf/timestamp.proto";

// QueryService provides log querying capabilities.
service QueryService {
  // Search executes a query and streams matching records.
  rpc Search(SearchRequest) returns (stream SearchResponse);

  // Follow executes a query and streams matching records, then continues
  // streaming new records as they arrive (like tail -f).
  rpc Follow(FollowRequest) returns (stream FollowResponse);

  // Explain returns the query execution plan without executing.
  rpc Explain(ExplainRequest) returns (ExplainResponse);

  // GetContext returns records surrounding a specific record, across all vaults.
  // Uses the anchor record's write timestamp to find nearby records.
  rpc GetContext(GetContextRequest) returns (GetContextResponse);

  // GetSyntax returns the query language keyword sets for frontend tokenization.
  // Called once at startup so the frontend stays in sync with the backend.
  rpc GetSyntax(GetSyntaxRequest) returns (GetSyntaxResponse);

  // ValidateQuery checks whether a query expression is syntactically valid.
  // Returns the first error position and message if invalid.
  rpc ValidateQuery(ValidateQueryRequest) returns (ValidateQueryResponse);

  // GetPipelineFields returns the available fields and completions at a
  // given cursor position within a pipeline expression.
  rpc GetPipelineFields(GetPipelineFieldsRequest) returns (GetPipelineFieldsResponse);

  // GetFields samples matching records and extracts field names with value
  // distributions using the backend's full extractor suite (KV, logfmt,
  // access log). Replaces the frontend's client-side field extraction.
  rpc GetFields(GetFieldsRequest) returns (GetFieldsResponse);

  // ExportToVault materializes search results into a target vault as a
  // background job. Returns a job ID for progress tracking.
  rpc ExportToVault(ExportToVaultRequest) returns (ExportToVaultResponse);
}

message SearchRequest {
  Query query = 1;
  bytes resume_token = 2; // Opaque token for pagination
}

message SearchResponse {
  repeated Record records = 1;
  bytes resume_token = 2; // Token to continue from, if more results exist
  bool has_more = 3;

  // Set for pipeline queries (e.g. "error | stats count by level").
  // When present, records is empty; results are in table form.
  TableResult table_result = 4;

  // Volume histogram, set on the first response message only.
  // Provides an approximate record count distribution by time bucket and level.
  repeated HistogramBucket histogram = 5;

  // Number of chunks skipped because they are in an offline storage tier
  // (S3 Glacier, Azure Archive). Set on the first response message.
  int32 archived_chunks = 6;

  // Server-side processing time in milliseconds, measured from the start of
  // request handling to the moment this message is sent. Set on the first
  // response message only. Excludes network/transport time so the UI can
  // distinguish server work from round-trip cost. See gastrolog-66b7x.
  int64 server_elapsed_ms = 7;
}

// HistogramBucket holds the count for a single time bucket in the volume histogram.
// Used as a lightweight side-channel on search responses — not part of the pipeline.
message HistogramBucket {
  int64 timestamp_ms = 1;              // Bucket start time (milliseconds since epoch)
  int64 count = 2;                     // Total records in this bucket
  map<string, int64> group_counts = 3; // Level → count; records without level → "other"
  bool has_cloud_data = 4;             // True if cloud chunks cover this bucket
  int64 cloud_count = 5;              // Records from cloud chunks in this bucket (subset of count)
}

// TableResult holds aggregated results from a pipeline stats operator.
message TableResult {
  repeated string columns = 1;    // Column names in order (groups first, then aggregates)
  repeated TableRow rows = 2;     // Row data (same column order)
  bool truncated = 3;             // True if cardinality cap was hit
  string result_type = 4;         // "table" or "timeseries" (timeseries when bin() is used)
}

message TableRow {
  repeated string values = 1;
}

message FollowRequest {
  Query query = 1;
}

message FollowResponse {
  repeated Record records = 1;
}

message ExplainRequest {
  Query query = 1;
}

message ExplainResponse {
  repeated ChunkPlan chunks = 1;
  string direction = 2;    // "forward" or "reverse"
  int32 total_chunks = 3;  // Total chunks before time-range filtering
  string expression = 4;   // Parsed boolean expression (from BoolExpr.String())
  google.protobuf.Timestamp query_start = 5; // Resolved query start time
  google.protobuf.Timestamp query_end = 6;   // Resolved query end time
  repeated QueryPipelineStage pipeline_stages = 7; // Pipeline operators after the filter
}

// QueryPipelineStage describes a single pipeline operator in the query.
message QueryPipelineStage {
  string operator = 1;     // "stats", "where", "eval", "sort", etc.
  string description = 2;  // PipeOp.String() output
  bool materializing = 3;  // requires full materialization (stats, sort, tail, etc.)
  string note = 4;         // human-readable explanation of execution behavior
  string execution = 5;    // "streaming", "materializing", "short-circuit", "coordinator-only", "render-hint"
}

message Query {
  google.protobuf.Timestamp start = 1;
  google.protobuf.Timestamp end = 2;
  repeated string tokens = 3;
  repeated KVPredicate kv_predicates = 4;
  int64 limit = 5;
  int32 context_before = 6;
  int32 context_after = 7;

  // Raw query expression string, parsed server-side via querylang.
  // When set, tokens and kv_predicates are ignored.
  // Supports the full query language: bare words (tokens), key=value,
  // AND/OR/NOT, parentheses, start=/end=/limit= control args.
  // Examples: "error timeout", "(error OR warn) AND NOT debug",
  //           "start=2024-01-01T00:00:00Z level=error vault_id=<uuid>"
  string expression = 8;
}

message KVPredicate {
  string key = 1;   // Empty for value-exists check
  string value = 2; // Empty for key-exists check, "*" also means any
}

message Record {
  google.protobuf.Timestamp ingest_ts = 1;
  google.protobuf.Timestamp write_ts = 2;
  map<string, string> attrs = 3;
  bytes raw = 4;
  RecordRef ref = 5;
  google.protobuf.Timestamp source_ts = 6;

  // EventID fields for record identity and deduplication.
  uint32 ingest_seq = 7;   // Per-ingester rolling sequence counter
  bytes ingester_id = 8;   // 16-byte GLID
  bytes node_id = 9;       // 16-byte GLID — emitting node, disambiguates parallel ingesters
}

message RecordRef {
  bytes chunk_id = 1;
  uint64 pos = 2;
  bytes vault_id = 3; // Vault this record belongs to
}

// ResumeToken encodes pagination state for multi-vault queries.
// Each vault — local or remote — gets an opaque token keyed by vault UUID.
// The API node routes each token to wherever the vault lives.
message ResumeToken {
  map<string, bytes> vault_tokens = 1;
  // Frozen time bounds from the first page — prevents "last-5m" from
  // shifting between pages.
  google.protobuf.Timestamp frozen_start = 2;
  google.protobuf.Timestamp frozen_end = 3;
  // Highwater TS from the last emitted record. Acts as an exclusive
  // boundary on the next page (reverse: upper bound; forward: lower
  // bound) so pagination survives mid-scroll chunk lifecycle (seal,
  // transition, retention) without re-emitting already-seen records,
  // even when per-chunk positions become stale and unusable.
  google.protobuf.Timestamp highwater_ts = 4;
}

// InnerVaultToken is the serialized per-vault resume state.
// Stored as the opaque bytes value in ResumeToken.vault_tokens.
message InnerVaultToken {
  repeated VaultPosition positions = 1;
}

message VaultPosition {
  bytes vault_id = 1;
  bytes chunk_id = 2;
  uint64 position = 3; // MaxUint64 indicates chunk is exhausted
  // resume_ts is used instead of position for chunks without TS indexes
  // (e.g., cloud-backed). On resume, the scanner re-reads the chunk and
  // skips records already past this timestamp.
  google.protobuf.Timestamp resume_ts = 4;
}

message ChunkPlan {
  bytes chunk_id = 1;
  bool sealed = 2;
  int64 record_count = 3;
  repeated PipelineStep steps = 4;
  string scan_mode = 5; // "sequential", "index-driven", or "skipped"
  int64 estimated_records = 6;
  repeated string runtime_filters = 7;
  bytes vault_id = 8;
  google.protobuf.Timestamp write_start = 9;
  google.protobuf.Timestamp write_end = 10;
  string skip_reason = 11;
  repeated BranchPlan branch_plans = 12;
  bytes node_id = 13; // Node that owns this chunk's vault
}

message BranchPlan {
  string expression = 1;          // String representation of the branch
  repeated PipelineStep steps = 2;
  bool skipped = 3;
  string skip_reason = 4;
  int64 estimated_records = 5;
}

message PipelineStep {
  string name = 1;
  int64 input_estimate = 2;
  int64 output_estimate = 3;
  string action = 4; // "seek", "indexed", "runtime", "skipped"
  string reason = 5;
  string detail = 6;
  string predicate = 7; // What we're filtering for, e.g. "token(error, warn)"
}

message GetContextRequest {
  RecordRef ref = 1;   // The anchor record
  int32 before = 2;    // Number of records before anchor (default 5, max 50)
  int32 after = 3;     // Number of records after anchor (default 5, max 50)
}

message GetContextResponse {
  repeated Record before = 1;  // Records before anchor, oldest first, all vaults
  Record anchor = 2;           // The anchor record itself
  repeated Record after = 3;   // Records after anchor, oldest first, all vaults
}

message GetSyntaxRequest {}

message GetSyntaxResponse {
  repeated string directives = 1;       // Query control args (reverse, start, end, last, ...)
  repeated string pipe_keywords = 2;    // Pipe operator keywords (stats, where)
  repeated string pipe_functions = 3;   // Functions usable in pipe expressions (count, avg, bin, ...)
  repeated string lookup_tables = 4;    // Registered lookup table names (rdns, geoip, ...)
}

message ValidateQueryRequest {
  string expression = 1;
}

message ValidateQueryResponse {
  bool valid = 1;
  string error_message = 2;    // empty if valid
  int32 error_offset = 3;      // byte offset in original expression (-1 if valid)
  repeated HighlightSpan spans = 4;   // syntax highlighting spans (concatenation reproduces input)
  string expression = 5;              // echo back input for staleness detection
  bool has_pipeline = 6;              // whether query contains pipe operators
  bool can_follow = 7;               // whether query is compatible with follow mode
  bool has_export = 8;               // whether query contains an export operator
}

message HighlightSpan {
  string text = 1;   // raw source text
  string role = 2;   // "operator", "key", "value", "pipe-keyword", "function", etc.
}

message GetPipelineFieldsRequest {
  string expression = 1;
  int32 cursor = 2;                // byte offset of cursor
  repeated string base_fields = 3; // fields frontend has seen from search results
}

message GetPipelineFieldsResponse {
  repeated string fields = 1;       // available fields at cursor position
  repeated string completions = 2;  // context keywords ("by", "as", "rdns", etc.)
}

message GetFieldsRequest {
  string expression = 1;            // query expression (with time range directives)
  int32 max_samples = 2;            // max records to sample (0 = default 500)
}

message GetFieldsResponse {
  repeated FieldInfo attr_fields = 1;  // fields from record attributes
  repeated FieldInfo kv_fields = 2;    // fields from KV/logfmt/access log extraction
}

message FieldInfo {
  string key = 1;
  int32 count = 2;                     // records containing this field
  repeated FieldValue top_values = 3;  // most common values (up to 10)
}

message FieldValue {
  string value = 1;
  int32 count = 2;
}

message ExportToVaultRequest {
  string expression = 1;  // Full query expression
  string target = 2;      // Vault name or UUID — backend resolves
}

message ExportToVaultResponse {
  bytes job_id = 1;
}
