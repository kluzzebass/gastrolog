syntax = "proto3";

package gastrolog.v1;

option go_package = "gastrolog/api/gen/gastrolog/v1;gastrologv1";

import "gastrolog/v1/storage.proto";

// SystemService provides configuration management.
service SystemService {
  // GetConfig returns the current configuration.
  rpc GetSystem(GetSystemRequest) returns (GetSystemResponse);

  // ListIngesters returns all registered ingesters.
  rpc ListIngesters(ListIngestersRequest) returns (ListIngestersResponse);

  // GetIngesterStatus returns status for a specific ingester.
  rpc GetIngesterStatus(GetIngesterStatusRequest) returns (GetIngesterStatusResponse);

  // PutFilter creates or updates a filter.
  rpc PutFilter(PutFilterRequest) returns (PutFilterResponse);

  // DeleteFilter removes a filter.
  rpc DeleteFilter(DeleteFilterRequest) returns (DeleteFilterResponse);

  // PutRotationPolicy creates or updates a rotation policy.
  rpc PutRotationPolicy(PutRotationPolicyRequest) returns (PutRotationPolicyResponse);

  // DeleteRotationPolicy removes a rotation policy.
  rpc DeleteRotationPolicy(DeleteRotationPolicyRequest) returns (DeleteRotationPolicyResponse);

  // PutRetentionPolicy creates or updates a retention policy.
  rpc PutRetentionPolicy(PutRetentionPolicyRequest) returns (PutRetentionPolicyResponse);

  // DeleteRetentionPolicy removes a retention policy.
  rpc DeleteRetentionPolicy(DeleteRetentionPolicyRequest) returns (DeleteRetentionPolicyResponse);

  // PutVault creates or updates a vault.
  rpc PutVault(PutVaultRequest) returns (PutVaultResponse);

  // DeleteVault removes a vault (must be empty).
  rpc DeleteVault(DeleteVaultRequest) returns (DeleteVaultResponse);

  // PutIngester creates or updates an ingester.
  rpc PutIngester(PutIngesterRequest) returns (PutIngesterResponse);

  // DeleteIngester removes an ingester.
  rpc DeleteIngester(DeleteIngesterRequest) returns (DeleteIngesterResponse);

  // GetSettings returns system settings (auth, query, scheduler, TLS, lookup).
  rpc GetSettings(GetSettingsRequest) returns (GetSettingsResponse);

  // PutSettings updates system settings. Only fields explicitly set are updated.
  rpc PutSettings(PutSettingsRequest) returns (PutSettingsResponse);

  // RegenerateJwtSecret generates a new random JWT signing secret, replacing the
  // existing one. All active sessions are immediately invalidated cluster-wide.
  rpc RegenerateJwtSecret(RegenerateJwtSecretRequest) returns (RegenerateJwtSecretResponse);

  // GetPreferences returns the current user's preferences.
  rpc GetPreferences(GetPreferencesRequest) returns (GetPreferencesResponse);

  // PutPreferences updates the current user's preferences.
  rpc PutPreferences(PutPreferencesRequest) returns (PutPreferencesResponse);

  // GetSavedQueries returns the current user's saved queries.
  rpc GetSavedQueries(GetSavedQueriesRequest) returns (GetSavedQueriesResponse);

  // PutSavedQuery creates or updates a saved query by name.
  rpc PutSavedQuery(PutSavedQueryRequest) returns (PutSavedQueryResponse);

  // DeleteSavedQuery removes a saved query by name.
  rpc DeleteSavedQuery(DeleteSavedQueryRequest) returns (DeleteSavedQueryResponse);

  // ListCertificates returns all certificates.
  rpc ListCertificates(ListCertificatesRequest) returns (ListCertificatesResponse);

  // GetCertificate returns a certificate by ID (includes PEM content).
  rpc GetCertificate(GetCertificateRequest) returns (GetCertificateResponse);

  // PutCertificate creates or updates a certificate.
  rpc PutCertificate(PutCertificateRequest) returns (PutCertificateResponse);

  // DeleteCertificate removes a certificate.
  rpc DeleteCertificate(DeleteCertificateRequest) returns (DeleteCertificateResponse);

  // PauseVault pauses ingestion for a vault.
  rpc PauseVault(PauseVaultRequest) returns (PauseVaultResponse);

  // ResumeVault resumes ingestion for a vault.
  rpc ResumeVault(ResumeVaultRequest) returns (ResumeVaultResponse);

  // TestIngester tests connectivity for an ingester configuration without saving it.
  rpc TestIngester(TestIngesterRequest) returns (TestIngesterResponse);

  // GetIngesterDefaults returns default parameter values for each ingester type.
  rpc GetIngesterDefaults(GetIngesterDefaultsRequest) returns (GetIngesterDefaultsResponse);

  // TriggerIngester sends a one-shot trigger to a running ingester.
  // Only supported by ingesters that implement the Triggerable interface (e.g. scatterbox).
  rpc TriggerIngester(TriggerIngesterRequest) returns (TriggerIngesterResponse);

  // PutNodeConfig creates or updates a node configuration.
  rpc PutNodeConfig(PutNodeConfigRequest) returns (PutNodeConfigResponse);

  // PutRoute creates or updates a route.
  rpc PutRoute(PutRouteRequest) returns (PutRouteResponse);

  // DeleteRoute removes a route.
  rpc DeleteRoute(DeleteRouteRequest) returns (DeleteRouteResponse);

  // GenerateName returns a random petname for use as a default entity name.
  rpc GenerateName(GenerateNameRequest) returns (GenerateNameResponse);

  // WatchConfig streams a notification whenever configuration changes.
  rpc WatchSystem(WatchSystemRequest) returns (stream WatchSystemResponse);

  // GetRouteStats returns live routing statistics.
  rpc GetRouteStats(GetRouteStatsRequest) returns (GetRouteStatsResponse);

  // ListManagedFiles returns all managed files.
  rpc ListManagedFiles(ListManagedFilesRequest) returns (ListManagedFilesResponse);

  // DeleteManagedFile removes an managed file.
  rpc DeleteManagedFile(DeleteManagedFileRequest) returns (DeleteManagedFileResponse);

  // TestCloudService tests connectivity for a cloud storage configuration without saving it.
  rpc TestCloudService(TestCloudServiceRequest) returns (TestCloudServiceResponse);

  // TestHTTPLookup tests an HTTP lookup configuration with a sample value.
  rpc TestHTTPLookup(TestHTTPLookupRequest) returns (TestHTTPLookupResponse);

  // PreviewCSVLookup reads a managed CSV file and returns column headers, sample rows, and total row count.
  rpc PreviewCSVLookup(PreviewCSVLookupRequest) returns (PreviewCSVLookupResponse);

  // PreviewJSONLookup reads a managed JSON file and returns pretty-printed content for structure inspection.
  rpc PreviewJSONLookup(PreviewJSONLookupRequest) returns (PreviewJSONLookupResponse);

  // Cloud services
  rpc PutCloudService(PutCloudServiceRequest) returns (PutCloudServiceResponse);
  rpc DeleteCloudService(DeleteCloudServiceRequest) returns (DeleteCloudServiceResponse);

  // Node storage
  rpc SetNodeStorageConfig(SetNodeStorageConfigRequest) returns (SetNodeStorageConfigResponse);

  // Tiers
  rpc PutTier(PutTierRequest) returns (PutTierResponse);
  rpc DeleteTier(DeleteTierRequest) returns (DeleteTierResponse);
}

message GetSystemRequest {}

message GetSystemResponse {
  repeated VaultConfig vaults = 1;
  repeated IngesterConfig ingesters = 2;
  repeated RotationPolicyConfig rotation_policies = 3;
  repeated FilterConfig filters = 4;
  repeated RetentionPolicyConfig retention_policies = 5;
  repeated NodeConfig node_configs = 6;
  repeated RouteConfig routes = 7;
  // Monotonically increasing version derived from the Raft log index.
  // Used by the frontend to avoid regressing the cache with stale reads.
  uint64 system_version = 9;
  repeated ManagedFileInfo managed_files = 8;
  repeated CloudService cloud_services = 10;
  repeated NodeStorageConfig node_storage_configs = 11;
  repeated TierConfig tiers = 12;
}

message RetentionRule {
  bytes retention_policy_id = 1;
  string action = 2;              // "expire", "eject", "transition", or "archive"
  bytes destination_id = 3;      // deprecated — was target vault for action=migrate
  repeated bytes eject_route_ids = 4; // target routes, only for action=eject
  string archive_storage_class = 5;    // target class for archive (e.g. "GLACIER", "DEEP_ARCHIVE")
}

message VaultConfig {
  bytes id = 1;
  bool enabled = 7;
  string name = 8;
}

message RouteDestination {
  bytes vault_id = 1;
}

message RouteConfig {
  bytes id = 1;
  string name = 2;
  bytes filter_id = 3;                       // references FilterConfig.id
  repeated RouteDestination destinations = 4;
  string distribution = 5;                     // "fanout" (default), "round-robin", or "failover"
  bool enabled = 6;
  bool eject_only = 7;                          // when true, excluded from live ingestion FilterSet; usable only as eject target
}

message IngesterConfig {
  bytes id = 1;
  string type = 2;
  map<string, string> params = 3;
  bool enabled = 4;
  string name = 5;
  bytes node_id = 6;
}

message FilterConfig {
  string expression = 1;
  bytes id = 2;
  string name = 3;
}

message RotationPolicyConfig {
  int64 max_bytes = 1;
  int64 max_records = 2;
  int64 max_age_seconds = 3;
  string cron = 4;
  bytes id = 5;
  string name = 6;
}

message RetentionPolicyConfig {
  int64 max_age_seconds = 1;
  int64 max_bytes = 2;
  int64 max_chunks = 3;
  bytes id = 4;
  string name = 5;
}

message ListIngestersRequest {}

message ListIngestersResponse {
  repeated IngesterInfo ingesters = 1;
}

message IngesterInfo {
  bytes id = 1;
  string type = 2;
  bool running = 3;
  string name = 4;
  bytes node_id = 5;
}

message GetIngesterStatusRequest {
  bytes id = 1;
}

message GetIngesterStatusResponse {
  bytes id = 1;
  string type = 2;
  bool running = 3;
  int64 messages_ingested = 4;
  int64 errors = 5;
  int64 bytes_ingested = 6;
}

message PutFilterRequest {
  FilterConfig config = 2;
}

message PutFilterResponse {
  GetSystemResponse system = 1;
}

message DeleteFilterRequest {
  bytes id = 1;
}

message DeleteFilterResponse {
  GetSystemResponse system = 1;
}

message PutRotationPolicyRequest {
  RotationPolicyConfig config = 2;
}

message PutRotationPolicyResponse {
  GetSystemResponse system = 1;
}

message DeleteRotationPolicyRequest {
  bytes id = 1;
}

message DeleteRotationPolicyResponse {
  GetSystemResponse system = 1;
}

message PutRetentionPolicyRequest {
  RetentionPolicyConfig config = 2;
}

message PutRetentionPolicyResponse {
  GetSystemResponse system = 1;
}

message DeleteRetentionPolicyRequest {
  bytes id = 1;
}

message DeleteRetentionPolicyResponse {
  GetSystemResponse system = 1;
}

message PutVaultRequest {
  VaultConfig config = 1;
}

message PutVaultResponse {
  GetSystemResponse system = 1;
}

message DeleteVaultRequest {
  bytes id = 1;
  bool force = 2;
  // When true, the vault's data directory is also deleted from disk.
  // Only meaningful for file vaults. Defaults to false (preserve data).
  bool delete_data = 3;
}

message DeleteVaultResponse {
  GetSystemResponse system = 1;
}

message PutRouteRequest {
  RouteConfig config = 1;
}

message PutRouteResponse {
  GetSystemResponse system = 1;
}

message DeleteRouteRequest {
  bytes id = 1;
}

message DeleteRouteResponse {
  GetSystemResponse system = 1;
}

message PutIngesterRequest {
  IngesterConfig config = 1;
}

message PutIngesterResponse {
  GetSystemResponse system = 1;
}

message DeleteIngesterRequest {
  bytes id = 1;
}

message DeleteIngesterResponse {
  GetSystemResponse system = 1;
}

message GetSettingsRequest {
  bool include_secrets = 1; // When true, return actual secret values (for export/backup).
}

// Sub-messages for GetSettingsResponse (read-only fields included).

message PasswordPolicySettings {
  int32 min_length = 1;
  bool require_mixed_case = 2;
  bool require_digit = 3;
  bool require_special = 4;
  int32 max_consecutive_repeats = 5;
  bool forbid_animal_noise = 6;
}

message MaxMindSettings {
  bool auto_download = 1;
  bool license_configured = 2;   // read-only: true when account_id + license_key are both set
  string last_update = 3;         // read-only: RFC3339 timestamp of last successful download
  bytes account_id = 4;          // only populated when include_secrets
  string license_key = 5;         // only populated when include_secrets
}

message AuthSettings {
  string token_duration = 1;
  bool jwt_secret_configured = 2; // read-only: true when a JWT secret exists
  string refresh_token_duration = 3;
  PasswordPolicySettings password_policy = 4;
  reserved 5; // was jwt_secret (removed: secret is never exposed over the API)
}

message QuerySettings {
  string timeout = 1;
  string max_follow_duration = 2;
  int32 max_result_count = 3;
}

message SchedulerSettings {
  int32 max_concurrent_jobs = 1;
}

message TLSSettings {
  string default_cert = 1;
  bool enabled = 2;
  bool http_to_https_redirect = 3;
  string https_port = 4;
}

message LookupSettings {
  reserved 1, 2, 3;  // 1: geoip_db_path, 2: asn_db_path, 3: maxmind (moved to GetSettingsResponse)
  repeated HTTPLookupEntry http_lookups = 4;
  repeated JSONFileLookupEntry json_file_lookups = 5;
  repeated MMDBLookupEntry mmdb_lookups = 6;
  repeated CSVLookupEntry csv_lookups = 7;
  repeated StaticLookupEntry static_lookups = 8;
}

// MMDBLookupEntry defines a named MMDB-backed lookup table (GeoIP City or ASN).
message MMDBLookupEntry {
  string name = 1;     // registry name (e.g. "geoip", "asn", "custom-geo")
  string db_type = 2;  // "city" or "asn" — determines which fields are decoded
  bytes file_id = 3;  // managed file ID (UUID); empty = use auto-downloaded database
}

// HTTPLookupParam defines a named parameter for an HTTP lookup table.
// Parameters are positional — query fields map to params in order.
message HTTPLookupParam {
  string name = 1;        // URL template placeholder name, e.g. "lat"
  string description = 2; // human-readable description for UI/tab completion
}

// HTTPLookupEntry defines an HTTP API lookup table for field enrichment.
message HTTPLookupEntry {
  string name = 1;          // registry name (e.g. "users")
  string url_template = 2;  // e.g. "http://api/users/{value}"
  map<string, string> headers = 3; // optional auth/custom headers
  string timeout = 4;       // Go duration string, optional
  string cache_ttl = 5;     // Go duration string, optional
  int32 cache_size = 6;     // optional, default 10000
  repeated string response_paths = 7; // JSONPath expressions, e.g. "$.data.user"
  repeated HTTPLookupParam parameters = 8; // ordered param definitions for URL template
}

// JSONFileLookupEntry defines a JSON file-backed lookup table for field enrichment.
// The JSON file is memory-mapped and queried via JSONPath expressions at lookup time.
message JSONFileLookupEntry {
  string name = 1;                            // registry name (e.g. "hosts")
  bytes file_id = 2;                        // managed file ID (UUID)
  string query = 3;                          // JSONPath query template with {name} placeholders, e.g. "$.hosts[?(@.ip == '{ip}')]"
  repeated string response_paths = 4;        // optional: JSONPath to extract from results; empty = flatten
  repeated HTTPLookupParam parameters = 5;   // ordered param definitions for query template placeholders
}

// CSVLookupEntry defines a CSV file-backed lookup table for key→row enrichment.
// The CSV is loaded into memory and keyed by a configurable column.
message CSVLookupEntry {
  string name = 1;                       // registry name (e.g. "assets")
  bytes file_id = 2;                   // managed file ID (UUID)
  string key_column = 3;                // column header for lookup key; empty = first column
  repeated string value_columns = 4;    // columns to include in output; empty = all non-key
}

// StaticLookupEntry defines a manually-entered lookup table.
// Data is stored directly in the Raft-replicated config — no file upload needed.
// Useful for small, hand-maintained mappings (host→team, code→label).
message StaticLookupEntry {
  string name = 1;                       // registry name (e.g. "teams")
  string key_column = 2;                 // name of the key field (e.g. "host")
  repeated string value_columns = 3;     // names of value fields (e.g. ["team", "owner"])
  repeated StaticLookupRow rows = 4;     // the data rows
}

message StaticLookupRow {
  map<string, string> values = 1;        // column_name → cell_value
}

message ClusterSettings {
  string broadcast_interval = 1; // Go duration string, e.g. "5s". Default: "5s".
}

message GetSettingsResponse {
  AuthSettings auth = 1;
  QuerySettings query = 2;
  SchedulerSettings scheduler = 3;
  TLSSettings tls = 4;
  LookupSettings lookup = 5;
  bool setup_wizard_dismissed = 6;
  bytes node_id = 7;
  string node_name = 8;
  ClusterSettings cluster = 9;
  MaxMindSettings maxmind = 10;
}

// Sub-messages for PutSettingsRequest (optional fields for merge semantics).

message PutPasswordPolicySettings {
  optional int32 min_length = 1;
  optional bool require_mixed_case = 2;
  optional bool require_digit = 3;
  optional bool require_special = 4;
  optional int32 max_consecutive_repeats = 5;
  optional bool forbid_animal_noise = 6;
}

message PutAuthSettings {
  optional string token_duration = 1;
  reserved 2; // was jwt_secret (removed: use RegenerateJwtSecret RPC instead)
  optional string refresh_token_duration = 3;
  PutPasswordPolicySettings password_policy = 4;
}

message PutQuerySettings {
  optional string timeout = 1;
  optional string max_follow_duration = 2;
  optional int32 max_result_count = 3;
}

message PutSchedulerSettings {
  optional int32 max_concurrent_jobs = 1;
}

message PutTLSSettings {
  optional string default_cert = 1;
  optional bool enabled = 2;
  optional bool http_to_https_redirect = 3;
  optional string https_port = 4;
}

message PutMaxMindSettings {
  optional bool auto_download = 1;
  optional bytes account_id = 2;
  optional string license_key = 3;
}

message PutLookupSettings {
  reserved 1, 2, 3;  // 1: geoip_db_path, 2: asn_db_path, 3: maxmind (moved to PutSettingsRequest)
  repeated HTTPLookupEntry http_lookups = 4; // replaces the full list when present
  repeated JSONFileLookupEntry json_file_lookups = 5; // replaces the full list when present
  repeated MMDBLookupEntry mmdb_lookups = 6; // replaces the full list when present
  repeated CSVLookupEntry csv_lookups = 7; // replaces the full list when present
  repeated StaticLookupEntry static_lookups = 8; // replaces the full list when present
}

message PutClusterSettings {
  optional string broadcast_interval = 1;
}

message PutSettingsRequest {
  PutAuthSettings auth = 1;
  PutQuerySettings query = 2;
  PutSchedulerSettings scheduler = 3;
  PutTLSSettings tls = 4;
  PutLookupSettings lookup = 5;
  optional bool setup_wizard_dismissed = 6;
  PutClusterSettings cluster = 7;
  PutMaxMindSettings maxmind = 8;
}

message PutSettingsResponse {
  MmdbValidation geoip_validation = 1; // Populated when geoip_db_path was set.
  MmdbValidation asn_validation = 2;   // Populated when asn_db_path was set.
}

message RegenerateJwtSecretRequest {}
message RegenerateJwtSecretResponse {}

// MmdbValidation is the result of probing a MaxMind MMDB file on save.
message MmdbValidation {
  bool valid = 1;
  string error = 2;          // Non-empty on failure; describes the issue.
  string database_type = 3;  // e.g. "GeoLite2-City", "GeoIP2-ISP"
  string build_time = 4;     // RFC 3339 timestamp.
  uint32 node_count = 5;     // Number of nodes in the search tree.
}

message GetPreferencesRequest {}

message GetPreferencesResponse {
  string theme = 1;
  string syntax_highlight = 2;
  string palette = 3;
}

message PutPreferencesRequest {
  string theme = 1;
  string syntax_highlight = 2;
  string palette = 3;
}

message PutPreferencesResponse {}

message SavedQuery {
  string name = 1;
  string query = 2;
}

message GetSavedQueriesRequest {}

message GetSavedQueriesResponse {
  repeated SavedQuery queries = 1;
}

message PutSavedQueryRequest {
  SavedQuery query = 1;
}

message PutSavedQueryResponse {}

message DeleteSavedQueryRequest {
  string name = 1;
}

message DeleteSavedQueryResponse {}

message ListCertificatesRequest {}

message ListCertificatesResponse {
  repeated CertificateInfo certificates = 1;
}

message CertificateInfo {
  bytes id = 1;
  string name = 2;
}

message GetCertificateRequest {
  bytes id = 1;
}

message GetCertificateResponse {
  bytes id = 1;
  string name = 7;
  string cert_pem = 2;
  // key_pem is never populated in responses; private keys must not be exposed via API.
  string key_pem = 3;
  string cert_file = 4;
  string key_file = 5;
}

message PutCertificateRequest {
  bytes id = 1;
  string name = 7;
  string cert_pem = 2;
  string key_pem = 3;  // When updating, empty means keep existing key.
  string cert_file = 4;
  string key_file = 5;
  bool set_as_default = 6;
}

message PutCertificateResponse {
  GetSystemResponse system = 1;
}

message DeleteCertificateRequest {
  bytes id = 1;
}

message DeleteCertificateResponse {
  GetSystemResponse system = 1;
}

message PauseVaultRequest {
  bytes id = 1;
}

message PauseVaultResponse {
  GetSystemResponse system = 1;
}

message ResumeVaultRequest {
  bytes id = 1;
}

message ResumeVaultResponse {
  GetSystemResponse system = 1;
}

message TestIngesterRequest {
  string type = 1;
  map<string, string> params = 2;
  // Optional ingester ID — when set, the trial-bind port check skips
  // addresses held by this ingester (it's already running on them).
  bytes id = 3;
}

message TestIngesterResponse {
  bool success = 1;
  string message = 2;
}

message TriggerIngesterRequest {
  bytes id = 1;
}

message TriggerIngesterResponse {}

message TestCloudServiceRequest {
  string type = 1;
  map<string, string> params = 2;
}

message TestCloudServiceResponse {
  bool success = 1;
  string message = 2;
}

message GetIngesterDefaultsRequest {}

message IngesterTypeDefaults {
  map<string, string> params = 1;
}

message GetIngesterDefaultsResponse {
  map<string, IngesterTypeDefaults> types = 1;
}

message NodeConfig {
  bytes id = 1;
  string name = 2;
}

// TierType identifies the storage medium for a tier.
enum TierType {
  TIER_TYPE_UNSPECIFIED = 0;
  TIER_TYPE_MEMORY = 1;
  TIER_TYPE_FILE = 2;
  TIER_TYPE_CLOUD = 3;
  TIER_TYPE_JSONL = 4;
}

// TierConfig defines a storage tier owned by exactly one vault. Tiers are
// ordered within a vault by their position field (0 = hottest / first).
message TierConfig {
  bytes id = 1;
  string name = 2;
  TierType type = 3;
  bytes rotation_policy_id = 4;
  repeated RetentionRule retention_rules = 5;
  uint64 memory_budget_bytes = 6;
  uint32 storage_class = 7;
  bytes cloud_service_id = 8;
  uint32 active_chunk_class = 9;
  uint32 cache_class = 10;
  uint32 replication_factor = 12;   // desired RF (1 = no replication, default)
  string path = 14;                       // direct path for JSONL sinks
  repeated TierPlacement placements = 15; // system-managed: file storage assignments by placement manager
  bytes vault_id = 16;                   // owning vault — exactly one vault per tier
  uint32 position = 17;                   // 0-based order within the vault's tier chain
  string cache_eviction = 18;             // "lru" (default) or "ttl"
  string cache_budget = 19;              // max cache size (e.g. "1GB", "500MB"; default: "1GiB")
  string cache_ttl = 20;                  // eviction TTL duration (e.g. "1h", "7d"); only for ttl mode
}

// TierPlacement assigns one replica of a tier to a specific file storage.
// The node is derived from the file storage's NodeStorageConfig.
message TierPlacement {
  bytes storage_id = 1;   // references FileStorage.id
  bool leader = 2;         // true = this storage bootstraps the Raft group (initial leader)
}

message PutNodeConfigRequest {
  NodeConfig config = 1;
}

message PutNodeConfigResponse {
  GetSystemResponse system = 1;
}

message GenerateNameRequest {}

message GenerateNameResponse {
  string name = 1;
}

message WatchSystemRequest {}

message WatchSystemResponse {
  // The config version (Raft log index) that triggered this notification.
  // Clients should only invalidate their config cache when this version
  // exceeds the version they already hold from a mutation response.
  uint64 system_version = 1;
}

message GetRouteStatsRequest {}

message GetRouteStatsResponse {
  // Global counters since process start.
  int64 total_ingested = 1;   // total records entering ingest()
  int64 total_dropped = 2;    // records matching no filter (silently lost)
  int64 total_routed = 3;     // records delivered to at least one vault
  bool filter_set_active = 4; // false = no routes compiled, all records dropped

  // Per-vault destination counters.
  repeated VaultRouteStats vault_stats = 5;

  // Per-route counters.
  repeated PerRouteStats route_stats = 6;
}

message VaultRouteStats {
  bytes vault_id = 1;
  int64 records_matched = 2;   // records routed to this vault
  int64 records_forwarded = 3; // subset sent to a remote node
}

message PerRouteStats {
  bytes route_id = 1;
  int64 records_matched = 2;   // records matched by this route
  int64 records_forwarded = 3; // subset sent to remote nodes
}

// --- Managed Files ---

message ManagedFileInfo {
  bytes id = 1;
  string name = 2;          // original filename
  string sha256 = 3;        // hex-encoded content hash
  int64 size = 4;           // file size in bytes
  string uploaded_at = 5;   // RFC3339 timestamp
}

message ListManagedFilesRequest {}

message ListManagedFilesResponse {
  repeated ManagedFileInfo files = 1;
}

message DeleteManagedFileRequest {
  bytes id = 1;
}

message DeleteManagedFileResponse {}

message TestHTTPLookupRequest {
  HTTPLookupEntry config = 1;          // the lookup configuration to test
  map<string, string> values = 2;      // test values: key=label, value=lookup input; 0 entries = config validation only
}

message TestHTTPLookupResponse {
  bool success = 1;
  string error = 2;                    // non-empty on failure
  repeated TestHTTPLookupResult results = 3; // one per test value
}

message TestHTTPLookupResult {
  string label = 1;                    // the key from the request values map
  string value = 2;                    // the input value that was looked up
  map<string, string> fields = 3;      // extracted fields (empty on miss)
}

message PreviewCSVLookupRequest {
  bytes file_id = 1;                    // managed file ID (UUID)
  string key_column = 2;                 // column to use as key; empty = first column
  repeated string value_columns = 3;     // columns to include; empty = all non-key
  int32 max_rows = 4;                    // maximum sample rows to return; 0 = default (10)
}

message PreviewCSVLookupResponse {
  repeated string columns = 1;           // all column headers from the CSV file
  string key_column = 2;                 // resolved key column name
  repeated CSVPreviewRow rows = 3;       // sample data rows (up to max_rows)
  int32 total_rows = 4;                  // total number of data rows (excluding header)
  string error = 5;                      // non-empty on failure
}

message CSVPreviewRow {
  repeated string values = 1;            // cell values in column order
}

message PreviewJSONLookupRequest {
  bytes file_id = 1;                     // managed file ID
  int32 max_bytes = 2;                   // max content bytes to return; 0 = default (4096)
  string query = 3;                      // optional JSONPath query to evaluate against the file
  map<string, string> parameters = 4;    // optional parameter values for {name} placeholders in query
}

message PreviewJSONLookupResponse {
  string content = 1;                    // pretty-printed JSON, potentially truncated
  int64 total_size = 2;                  // file size in bytes
  bool truncated = 3;                    // true if content was cut short
  string error = 4;                      // non-empty on failure
  string query_result = 5;              // pretty-printed JSONPath query result (when query is provided)
  string query_error = 6;              // JSONPath evaluation error (when query is provided but fails)
}

// --- Cloud Services ---

message PutCloudServiceRequest {
  CloudService config = 1;
}

message PutCloudServiceResponse {
  GetSystemResponse system = 1;
}

message DeleteCloudServiceRequest {
  bytes id = 1;
}

message DeleteCloudServiceResponse {
  GetSystemResponse system = 1;
}

// --- Node Storage ---

message SetNodeStorageConfigRequest {
  NodeStorageConfig config = 1;
}

message SetNodeStorageConfigResponse {
  GetSystemResponse system = 1;
}

// --- Tiers ---

message PutTierRequest {
  TierConfig config = 1;
}

message PutTierResponse {
  GetSystemResponse system = 1;
}

message DeleteTierRequest {
  bytes id = 1;
  reserved 2;       // was delete_data
  bool drain = 3;   // When true, drain chunks to the next tier before deleting.
}

message DeleteTierResponse {
  GetSystemResponse system = 1;
}
