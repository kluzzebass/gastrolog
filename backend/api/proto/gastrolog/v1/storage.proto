syntax = "proto3";

package gastrolog.v1;

option go_package = "gastrolog/api/gen/gastrolog/v1;gastrologv1";


// FileStorage declares a locally-attached storage resource on a node.
// Storage class ranks local storage by speed: lower = faster.
// Multiple file storages can share the same storage class (they form a pool).
message FileStorage {
  bytes id = 1;
  uint32 storage_class = 2;
  string name = 3;
  string path = 4;
  reserved 5;
  uint64 memory_budget_bytes = 6;
}

// NodeStorageConfig declares all locally-attached storage available on a node.
message NodeStorageConfig {
  bytes node_id = 1;
  repeated FileStorage file_storages = 2;
}

// CloudStorageTransition defines a single step in an archival lifecycle chain.
// Transitions are ordered by after_days (ascending). An empty storage_class
// means "delete" (expiry).
message CloudStorageTransition {
  string after = 1;          // duration after chunk seal (e.g. "30s", "7d", "2w", "360d")
  string storage_class = 2;  // target class (e.g. "GLACIER", "DEEP_ARCHIVE", "Archive"), empty = delete
}

// CloudService defines a cluster-wide cloud storage endpoint.
// Not tied to any node. Active chunks and cached chunks live on
// local storage, referenced by storage class.
message CloudService {
  bytes id = 1;
  string name = 2;
  string provider = 3;
  string bucket = 4;
  string region = 5;
  string endpoint = 6;
  string access_key = 7;
  string secret_key = 8;
  string container = 9;
  string connection_string = 10;
  string credentials_json = 11;
  reserved 12; // was storage_class (string) — replaced by uint32 field 15
  reserved 13, 14; // active_chunk_class, cache_class — moved to TierConfig
  uint32 storage_class = 15;

  // Archival lifecycle configuration.
  // "none" = bucket-level lifecycle handles it (or no archival).
  // "active" = GastroLog manages transitions via the sweep job.
  string archival_mode = 20;
  repeated CloudStorageTransition transitions = 21; // ordered by after_days
  string restore_tier = 22;                         // default restore speed (S3: Expedited/Standard/Bulk, Azure: High/Standard)
  uint32 restore_days = 23;                         // S3: how long restored copy stays readable (days)
  uint32 suspect_grace_days = 24;                   // days before suspect chunk removed from index (default 7)
  string reconcile_schedule = 25;                   // cron for reconciliation sweep (default "0 3 * * *")
}
