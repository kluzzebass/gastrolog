version: "2"

linters:
  default: none
  enable:
    - bodyclose
    - errcheck
    - errorlint
    - exhaustive
    - forbidigo
    - gocognit
    - gocritic
    - gocyclo
    - gosec
    - govet
    - ineffassign
    - intrange
    - misspell
    - modernize
    - nestif
    - nilerr
    - nolintlint
    - perfsprint
    - predeclared
    - staticcheck
    - unconvert
  settings:
    # Note: prior to gastrolog-51gme step 9, project-level gocognit /
    # gocyclo / nestif min-complexity overrides lived under the v1
    # `linters-settings` key, which golangci-lint v2 silently ignores.
    # The thresholds below match the v2 defaults (so behavior is the
    # same as it has actually been); future tightening should migrate
    # them under this key intentionally.
    forbidigo:
      forbid:
        # gastrolog-51gme step 9: chunk-file deletion must funnel through
        # VaultLifecycleReconciler.deleteChunk so the receipt protocol
        # (CmdRequestDelete + ack/finalize) is the single execution API.
        # New direct callers must either route through the reconciler or
        # justify their inclusion in the path-based exclusion list below.
        - pattern: "chunk\\.DeleteNoAnnounce"
          msg: "chunk.DeleteNoAnnounce must only be called from VaultLifecycleReconciler. Route deletes through reconciler.deleteChunk so the receipt protocol drives them. See gastrolog-51gme."
        - pattern: "\\.DeleteSilent\\("
          msg: "DeleteSilent must only be called from VaultLifecycleReconciler / file.Manager internals. Route deletes through reconciler.deleteChunk. See gastrolog-51gme."
        # gastrolog-51gme step 11: CmdDeleteChunk is deprecated. The
        # FSM command + apply handler stay for WAL backward-compat
        # (replaying old log segments must still work), but no new
        # producer is allowed. Use MarshalRequestDelete +
        # reconciler.deleteChunk instead.
        - pattern: "tierfsm\\.MarshalDeleteChunk"
          msg: "MarshalDeleteChunk produces a deprecated FSM command. Use reconciler.deleteChunk → CmdRequestDelete instead. See gastrolog-51gme step 11."
        # The announcing chunk-manager Delete fires AnnounceDelete → the
        # legacy CmdDeleteChunk path. New callers must route through
        # reconciler.deleteChunk so the receipt protocol drives cluster-
        # wide propagation. The path-based exclusion list below allow-
        # lists the legitimate non-reconciler call sites (memory-mode
        # fallbacks; the chunk-package definition itself).
        - pattern: "Chunks\\.Delete$"
          msg: "tier.Chunks.Delete announces CmdDeleteChunk. Route through tier.Reconciler.deleteChunk so the receipt protocol drives cluster-wide propagation. See gastrolog-51gme."
  exclusions:
    paths:
      - _test\.go
      - storetest/
    rules:
      # Allow-list for the gastrolog-51gme forbidigo rule above.
      # vault_lifecycle_reconciler.go: the reconciler itself.
      # reconfig_vaults.go: vault teardown / drainSweep / wireTierFSMOnDelete
      #   (legacy CmdDeleteChunk OnDelete cascade, scheduled for removal in
      #   step 11).
      # vault_ops.go: replaceForwardedChunk (catchup-replicate cleanup) +
      #   deleteFromFollowers (legacy fallback, removal alongside CmdDeleteChunk
      #   in step 11).
      # internal/chunk: where DeleteNoAnnounce is defined.
      - linters: [forbidigo]
        path: "internal/orchestrator/vault_lifecycle_reconciler\\.go"
      - linters: [forbidigo]
        path: "internal/orchestrator/reconfig_vaults\\.go"
      - linters: [forbidigo]
        path: "internal/orchestrator/vault_ops\\.go"
      - linters: [forbidigo]
        path: "internal/chunk/announcer\\.go"
      - linters: [forbidigo]
        path: "internal/chunk/file/manager\\.go"
      # Memory-mode reconciler-less fallback paths. Each callsite gates
      # tier.Chunks.Delete behind `if tier.Reconciler == nil`, so in
      # production (reconciler always wired) the lint-flagged statement
      # never executes. Removing these would break test harnesses that
      # build TIs directly without going through buildTierInstance. See
      # gastrolog-51gme.
      - linters: [forbidigo]
        path: "internal/orchestrator/archival_sweep\\.go"
      - linters: [forbidigo]
        path: "internal/orchestrator/tier_drain\\.go"
      - linters: [forbidigo]
        path: "internal/orchestrator/vault_transfers\\.go"
      - linters: [forbidigo]
        path: "internal/orchestrator/retention\\.go"
      # CLI tools intentionally use fmt.Print* for human-facing output;
      # exempt them from forbidigo's built-in fmt.Print* / println / print
      # bans. (The receipt-protocol forbid rules don't apply at the cmd
      # layer either — these are top-level binaries that don't touch
      # chunk lifecycle.)
      - linters: [forbidigo]
        path: "cmd/"
